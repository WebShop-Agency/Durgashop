kind = "web"
previewPath = "/"
title = "Durgashop"
version = "1.0.0"
id = "client"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24032

[services.development]
run = "npm run dev"

[services.production]
build = [ "npm", "run", "build" ]
publicDir = "dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24032"
BASE_PATH = "/"
